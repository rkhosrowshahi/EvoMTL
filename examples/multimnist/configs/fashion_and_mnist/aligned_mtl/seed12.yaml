# Aligned_MTL – Aligned Multi-Task Learning
# Senushkin et al., CVPR 2023
# Aligns task gradients in a common subspace to prevent destructive interference.

# General
mode: train
seed: 12
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: aligned_mtl-seed12
wandb_group: aligned_mtl

# Architecture
weighting: Aligned_MTL
# Aligned_MTL — no LibMTL weight_args
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/fashion_and_mnist/aligned_mtl/adam/seed_12/
load_path: null
