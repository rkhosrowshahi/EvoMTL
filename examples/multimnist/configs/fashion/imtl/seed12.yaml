# IMTL – Impartial Multi-Task Learning
# Liu et al., ICLR 2021
# Achieves impartiality by equalising the projected gradient magnitudes across tasks.

# General
mode: train
seed: 12
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: imtl-seed12
wandb_group: imtl

# Architecture
weighting: IMTL
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/fashion/imtl/adam/seed_12/
load_path: null

# IMTL-specific
# IMTL has no algorithm-specific hyperparameters.
