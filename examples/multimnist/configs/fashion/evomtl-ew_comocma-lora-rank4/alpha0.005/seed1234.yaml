# EW – Equal Weighting (baseline)
# Kendall et al., CVPR 2018
# Assigns equal weight to all task losses; serves as the standard MTL baseline.

# General
mode: train
seed: 1234
gpu_id: "0"

# Architecture
weighting: EW
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 30

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# EvoMTL (MOEA after supervised training; COMO-CMA-ES; two tasks only)
evo_training: true
evo_moea: comocma
evo_ps: flatten_lora
evo_ps_alpha: 0.005
evo_ps_r: 4
evo_ps_seed: 42
evo_iterations: 69
evo_num_kernels: 10
evo_sigma0: 0.1
evo_n_eval_batches: 1
evo_seed: 1234
evo_pop_size: 24
evo_z_lower: -1.0
evo_z_upper: 1.0
evo_cma_tolx: 0.0
evo_cma_tolfun: 0.0
evo_cma_tolfunrel: 0.0
evo_cma_tolfunhist: 0.0
evo_cma_tolstagnation: 0
evo_cma_tolflatfitness: 1e9

# COMO-CMA reference points: [] = defaults (Sofomore: 2*probe_loss+1; pymoo HV: nadir+1e-6).
evo_sofomore_reference_point: [2.3, 2.3]
evo_hv_ref_point: [2.3, 2.3]

evo_hv_center_aggregation: linear
evo_hv_softmax_temperature: 1.0


# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: evomtl-ew+comocma-lora-seed1234
wandb_group: evomtl-ew+comocma-lora

# Paths
save_path: logs/fashion/evomtl-ew_comocma-lora/adam/seed_1234/
load_path: null

# EW-specific
# EW has no algorithm-specific hyperparameters.
