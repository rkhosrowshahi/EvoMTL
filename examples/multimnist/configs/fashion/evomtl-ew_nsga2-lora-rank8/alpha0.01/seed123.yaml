# EW – Equal Weighting (baseline)
# Kendall et al., CVPR 2018
# Assigns equal weight to all task losses; serves as the standard MTL baseline.

# General
mode: train
seed: 123
gpu_id: "0"

# Architecture
weighting: EW
# EW — no LibMTL weight_args (equal task weights)
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 30

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# EvoMTL (MOEA after supervised training; COMO-CMA-ES; two tasks only)
evo_training: true
evo_moea: nsga2
evo_ps: flatten_lora
evo_ps_alpha: 0.01
evo_ps_r: 8
evo_ps_seed: 42
evo_iterations: 69
evo_n_eval_batches: 1
evo_seed: 123
evo_pop_size: 200
evo_z_lower: -1.0
evo_z_upper: 1.0

evo_hv_ref_point: [2.3, 2.3]

evo_hv_center_aggregation: linear
evo_hv_softmax_temperature: 1.0


# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: evomtl-ew+nsga2-lora-seed123
wandb_group: evomtl-ew+nsga2-lora

# Paths
save_path: logs/fashion/evomtl-ew_nsga2-lora/adam/seed_123/
load_path: null
