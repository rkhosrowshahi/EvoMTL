# CAGrad – Conflict-Averse Gradient
# Liu et al., NeurIPS 2021
# Minimises the worst-case loss improvement by finding a gradient that lies in a trust-region ball.

# General
mode: train
seed: 1234
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: cagrad-seed1234
wandb_group: cagrad

# Architecture
weighting: CAGrad
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/fashion/cagrad/adam/seed_1234/
load_path: null

# CAGrad-specific
calpha: 0.5    # conflict-aversion radius (c in the paper)
rescale: 1     # rescale final gradient: 0=no | 1=by mean norm | 2=by max norm
