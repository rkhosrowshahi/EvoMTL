# EW – Equal Weighting (baseline)
# Kendall et al., CVPR 2018
# Assigns equal weight to all task losses; serves as the standard MTL baseline.

# General
mode: train
seed: 12
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: evomtl-ew+nsga2-seed12
wandb_group: evomtl-ew+nsga2

# Architecture
weighting: EW
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 4

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# EvoMTL (MOEA after supervised training; NSGA-II)
evo_training: true
evo_moea: nsga2
evo_ps: spherical_lora
evo_ps_scale: 1.0
evo_ps_r: 4
evo_ps_seed: 42
evo_iterations: 30
evo_pop_size: 24
evo_z_lower: -3.0
evo_z_upper: 3.0
evo_n_eval_batches: 1
evo_seed: 12

# Paths
save_path: logs/fashion/evomtl-ew_nsga2/adam/seed_12/
load_path: null

# EW-specific
# EW has no algorithm-specific hyperparameters.
