# MGDA – Multiple Gradient Descent Algorithm
# Sener & Koltun, NeurIPS 2018
# Solves the MOO problem exactly by projecting onto the minimum-norm point of the gradient convex hull.

# General
mode: train
seed: 12
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: mgda-seed12
wandb_group: mgda

# Architecture
weighting: MGDA
mgda_gn: none          # gradient normalisation: none | l2 | loss | loss+
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

scheduler: cos
eta_min: 1.0e-6

# Paths
save_path: logs/fashion_and_mnist/mgda/adam/seed_12/
load_path: null
