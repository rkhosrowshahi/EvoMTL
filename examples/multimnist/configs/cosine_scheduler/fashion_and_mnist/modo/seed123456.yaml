# MoDo – Multi-Objective Descent with a Single-Loop Algorithm
# Qiu et al., ICML 2024
# Finds a Pareto-stationary point via a single-loop primal-dual update.

# General
mode: train
seed: 123456
gpu_id: "0"

# Architecture
weighting: MoDo
MoDo_gamma: 1.0e-3   # dual-variable step size
MoDo_rho: 0.1        # proximal regularisation coefficient
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

scheduler: cos
eta_min: 1.0e-6

# Paths
save_path: logs/fashion_and_mnist/modo/adam/seed_123456/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: modo-seed123456
wandb_group: modo
