# PCGrad – Projecting Conflicting Gradients
# Yu et al., NeurIPS 2020
# Projects each task gradient onto the normal plane of conflicting task gradients.

# General
mode: train
seed: 1234
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: pcgrad-seed1234
wandb_group: pcgrad

# Architecture
weighting: PCGrad
# PCGrad — no LibMTL weight_args
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

scheduler: cos
eta_min: 1.0e-6

# Paths
save_path: logs/fashion_and_mnist/pcgrad/adam/seed_1234/
load_path: null
