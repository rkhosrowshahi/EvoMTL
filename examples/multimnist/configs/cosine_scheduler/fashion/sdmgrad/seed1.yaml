# SDMGrad – Stochastic Direction-oriented Multitask Gradient
# Chen et al., ICML 2023
# Uses random direction-oriented gradient aggregation to approximate the Pareto front.

# General
mode: train
seed: 1
gpu_id: "0"

# Architecture
weighting: SDMGrad
SDMGrad_lamda: 0.3     # mixing coefficient between the two sampled gradient directions
SDMGrad_niter: 20      # inner iterations to solve the direction-finding QP
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

scheduler: cos
eta_min: 1.0e-6

# Paths
save_path: logs/fashion/sdmgrad/adam/seed_1/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: sdmgrad-seed1
wandb_group: sdmgrad
