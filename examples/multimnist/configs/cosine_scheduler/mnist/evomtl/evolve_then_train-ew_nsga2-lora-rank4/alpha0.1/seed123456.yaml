# EvoMTL — MOEA-first (moea_then_gd) + cosine LR during GD.
# Matches cosine_scheduler/mnist training recipe (Adam + CosineAnnealingLR).
# MOEA uses ``evo_iterations``; GD uses ``epochs`` with ``scheduler: cos``.

# General
mode: train
seed: 123456
gpu_id: "0"

# Architecture
weighting: EW
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: mnist
dataset_path: .
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

scheduler: cos
eta_min: 1.0e-6

# EvoMTL (NSGA-II on initial weights, then supervised epochs above)
evo_training: true
evo_schedule: moea_then_gd
evo_moea: nsga2
evo_adapter: flatten_lora
evo_adapter_alpha: 0.1
evo_adapter_r: 4
evo_adapter_seed: 42
evo_iterations: 2500
evo_num_batches: 1
evo_seed: 123456
evo_pop_size: 200
evo_lb: -1.0
evo_ub: 1.0
evo_eval_freq: 50
evo_crossover_prob: 0.9
evo_crossover_eta: 10.0
evo_mutation_prob: 0.9
evo_mutation_eta: 10.0
evo_hv_ref_point: [2.3, 2.3]
evo_hv_center_aggregation: linear
evo_hv_softmax_temperature: 1.0

# Paths
save_path: logs/mnist/evolve_then_train-cos-ew_nsga2-lora-rank_4/alpha_0.1/seed_123456/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: mnist-evolve_then_train-cos-ew+nsga2-lora-rank_4-alpha_0.1-seed123456
wandb_group: mnist-evolve_then_train-cos-ew+nsga2-lora-rank_4
