# Nash_MTL – Nash Bargaining for Multi-Task Learning
# Navon et al., ICML 2022
# Frames MTL as a cooperative bargaining game and finds the Nash bargaining solution.

# General
mode: train
seed: 12
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: nash_mtl-seed12
wandb_group: nash_mtl

# Architecture
weighting: Nash_MTL
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/mnist_and_fashion/nash_mtl/adam/seed_12/
load_path: null

# Nash_MTL-specific
update_weights_every: 1    # frequency (in steps) at which Nash weights are recomputed
optim_niter: 20            # inner Frank-Wolfe iterations per weight update
max_norm: 1.0              # gradient clipping norm for the Frank-Wolfe step
