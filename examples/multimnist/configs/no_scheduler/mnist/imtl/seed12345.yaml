# IMTL – Impartial Multi-Task Learning
# Liu et al., ICLR 2021
# Achieves impartiality by equalising the projected gradient magnitudes across tasks.

# General
mode: train
seed: 12345
gpu_id: "0"

# Architecture
weighting: IMTL
# IMTL — no LibMTL weight_args
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/mnist/imtl/adam/seed_12345/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: imtl-seed12345
wandb_group: imtl
