# PCGrad – Projecting Conflicting Gradients
# Yu et al., NeurIPS 2020
# Projects each task gradient onto the normal plane of conflicting task gradients.

# General
mode: train
seed: 1
gpu_id: "0"

# Architecture
weighting: PCGrad
# PCGrad — no LibMTL weight_args
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/mnist/pcgrad/adam/seed_1/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: pcgrad-seed1
wandb_group: pcgrad
