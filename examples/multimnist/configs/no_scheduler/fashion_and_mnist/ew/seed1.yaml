# EW – Equal Weighting (baseline)
# Kendall et al., CVPR 2018
# Assigns equal weight to all task losses; serves as the standard MTL baseline.

# General
mode: train
seed: 1
gpu_id: "0"

# Architecture
weighting: EW
# EW — no LibMTL weight_args (equal task weights)
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion_and_mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/fashion_and_mnist/ew/adam/seed_1/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: ew-seed1
wandb_group: ew
