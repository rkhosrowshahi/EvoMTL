# AutoLambda – Disentangling dynamic task relationships
# Liu et al., TMLR 2022
# Meta-learns task weights via approximate hypergradient; inner_step must be 1 in LibMTL.

# General
mode: train
seed: 123456
gpu_id: "0"

# Architecture
weighting: AutoLambda
outer_lr: 1.0e-3        # meta LR for task weights (LibMTL default)
inner_step: 1           # required for this LibMTL implementation
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/fashion/autolambda/adam/seed_123456/
load_path: null

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: autolambda-seed123456
wandb_group: autolambda
