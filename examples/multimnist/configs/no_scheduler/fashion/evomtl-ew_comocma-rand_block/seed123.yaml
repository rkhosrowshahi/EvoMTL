# EW – Equal Weighting (baseline)
# Kendall et al., CVPR 2018
# Assigns equal weight to all task losses; serves as the standard MTL baseline.

# General
mode: train
seed: 1
gpu_id: "0"

# Architecture
weighting: EW
# EW — no LibMTL weight_args (equal task weights)
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: fashion
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 30

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# EvoMTL (MOEA after supervised training; COMO-CMA-ES; two tasks only)
evo_training: true
evo_moea: comocma
evo_adapter: layerwise_random_blocking
evo_adapter_alpha: 1.0
evo_adapter_k: 128
evo_adapter_seed: 42
evo_iterations: 100
evo_cma_num_kernels: 10
evo_cma_sigma0: 0.005
evo_num_batches: 1
evo_seed: 1
evo_pop_size: 24
evo_lb: -10.0
evo_ub: 10.0
evo_eval_freq: 1
evo_cma_tolx: 0.0
evo_cma_tolfun: 0.0
evo_cma_tolfunrel: 0.0
evo_cma_tolfunhist: 0.0
evo_cma_tolstagnation: 0
evo_cma_tolflatfitness: 1e9

# COMO-CMA reference points: [] = defaults (Sofomore: 2*probe_loss+1; pymoo HV: nadir+1e-6).
evo_sofomore_reference_point: [2.3, 2.3]
evo_hv_ref_point: [2.3, 2.3]

evo_hv_center_aggregation: linear
evo_hv_softmax_temperature: 1.0


# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: evomtl-ew+comocma-rand_blocking-seed1
wandb_group: evomtl-ew+comocma-rand_blocking

# Paths
save_path: logs/fashion/evomtl-ew_comocma-rand_blocking/adam/seed_1/
load_path: null
