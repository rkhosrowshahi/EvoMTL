# MoCo – Multi-Objective Continual Learning via Online Optimisation
# Fernando et al., NeurIPS 2023
# Tracks a Pareto-stationary solution via EMA-based gradient correction.

# General
mode: train
seed: 123456
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: moco-seed123456
wandb_group: moco

# Architecture
weighting: MoCo
MoCo_beta: 0.5            # EMA coefficient for gradient mean estimation
MoCo_beta_sigma: 0.5      # EMA coefficient for gradient variance estimation
MoCo_gamma: 0.1           # step size for the dual-variable update
MoCo_gamma_sigma: 0.5     # EMA coefficient for variance of dual variables
MoCo_rho: 0.0             # regularisation strength (0 = no regularisation)
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-4
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/mnist/moco/adam/seed_123456/
load_path: null
