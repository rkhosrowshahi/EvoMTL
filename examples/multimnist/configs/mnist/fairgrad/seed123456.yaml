# FairGrad – Fair Gradient Descent for Multi-Task Learning
# Mahapatra & Rajan, ICML 2022
# Ensures each task receives a fair share of gradient updates via alpha-fairness.

# General
mode: train
seed: 123456
gpu_id: "0"

# Weights & Biases
wandb_entity: rasa_research
wandb_project: mtl
wandb_name: fairgrad-seed123456
wandb_group: fairgrad

# Architecture
weighting: FairGrad
arch: HPS
rep_grad: false
multi_input: false

# Dataset
dataset: mnist
dataset_path: .               # root of data/ folder (relative to examples/multimnist/)
num_tasks: 2
train_bs: 256
test_bs: 10000
epochs: 100

# Optimizer (Adam)
optim: adam
lr: 1.0e-3
weight_decay: 5.0e-4
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8
amsgrad: false

# Paths
save_path: logs/mnist/fairgrad/adam/seed_123456/
load_path: null

# FairGrad-specific
FairGrad_alpha: 1.0    # fairness exponent α (1.0 = proportional fairness; ∞ = max-min fairness)
